services:
  - type: web
    name: omnivio
    env: static
    buildCommand: npm install && npm run build:omnivio
    staticPublishPath: ./dist-omnivio
    envVars:
      - key: VITE_CONTACT_API_URL
        value: https://omnivio-contact-api.onrender.com/contact
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: omnivio-contact-api
    env: node
    rootDir: ./server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SMTP2GO_API_KEY
        sync: false
      - key: SMTP2GO_SENDER
        sync: false
      - key: CONTACT_TO
        sync: false
      - key: CORS_ORIGIN
        sync: false
