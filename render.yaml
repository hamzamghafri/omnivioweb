services:
  - type: web
    name: omnivio
    env: static
    buildCommand: npm install && npm run build:omnivio
    staticPublishPath: ./dist-omnivio
    envVars:
      - key: VITE_CONTACT_API_URL
        value: https://omnivio-contact.vercel.app/api/contact
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
